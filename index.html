<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>アカシック・レコード 25xx</title><style>
:root{--bg:#0a0b12;--ink:#d8dbe6;--dim:#9298aa;--gold:#f4d98a;--line:rgba(174,182,200,.16);}
@media(prefers-color-scheme:light){:root{--bg:#faf9f6;--ink:#22232e;--dim:#4c5468;--gold:#9a7a2c;--line:rgba(28,32,48,.14);}}
body{margin:0;background:var(--bg);color:var(--ink);
font-family:"Palatino Linotype","Hiragino Mincho ProN","Yu Mincho","Noto Serif CJK JP",serif;
display:grid;place-items:center;min-height:100vh;text-align:center;padding:24px;}
h1{font-size:34px;letter-spacing:.08em;color:var(--gold);font-weight:600;margin:0 0 10px;}
p{color:var(--dim);max-width:34em;line-height:2;}
nav{display:flex;gap:18px;justify-content:center;margin-top:34px;flex-wrap:wrap;}
nav a{color:var(--ink);border:1px solid var(--line);border-radius:10px;
padding:14px 26px;text-decoration:none;letter-spacing:.06em;}
nav a:hover{color:var(--gold);border-color:var(--gold);}
nav a.yt{border-color:var(--gold);color:var(--gold);background:linear-gradient(180deg,rgba(244,217,138,.1),transparent);}
</style><style>
#akx-gl{position:fixed;inset:0;z-index:0;pointer-events:none;}
#akx-rays{position:fixed;inset:-10%;z-index:0;pointer-events:none;opacity:.55;
background:
 linear-gradient(112deg,transparent 42%,rgba(255,240,205,.5) 47%,transparent 53%),
 linear-gradient(104deg,transparent 60%,rgba(255,236,196,.36) 66%,transparent 72%),
 linear-gradient(118deg,transparent 22%,rgba(214,226,248,.4) 27%,transparent 33%);
mix-blend-mode:multiply;animation:akxrays 26s ease-in-out infinite alternate;}
@keyframes akxrays{from{transform:translateX(-2.5%) skewX(-1deg);}to{transform:translateX(2.5%) skewX(1deg);}}
#akx-spot{position:fixed;inset:0;z-index:0;pointer-events:none;mix-blend-mode:multiply;
background:radial-gradient(520px circle at var(--mx,50%) var(--my,30%),rgba(255,240,206,.5),rgba(238,242,250,0) 60%);}
#akx-progress{position:fixed;top:0;left:0;height:2px;width:0;z-index:60;
background:linear-gradient(90deg,#856118,#c9a24a);box-shadow:0 0 12px rgba(169,127,38,.6);}
.akx-dot,.akx-ring{position:fixed;top:0;left:0;z-index:70;pointer-events:none;
border-radius:50%;transform:translate(-50%,-50%);will-change:transform;}
.akx-dot{width:7px;height:7px;background:#a97f26;box-shadow:0 0 12px 2px rgba(169,127,38,.55);}
.akx-ring{width:30px;height:30px;border:1.5px solid rgba(169,127,38,.55);
transition:width .25s,height .25s,border-color .25s,background .25s;}
.akx-ring.hot{width:60px;height:60px;border-color:#a97f26;background:rgba(169,127,38,.07);}
@media(pointer:fine){body.cursorfx{cursor:none;}}
#akx-trans{position:fixed;inset:0;z-index:120;pointer-events:none;opacity:0;
background:radial-gradient(circle at var(--tx,50%) var(--ty,50%),#fff 0%,#fff 32%,rgba(245,247,252,.8) 62%,rgba(245,247,252,0) 100%);
transition:opacity .45s ease;}
#akx-trans.on{opacity:1;}
#akx-trans .sweep{position:absolute;inset:0;overflow:hidden;}
#akx-trans .sweep::before{content:"";position:absolute;top:-20%;left:0;width:55%;height:140%;
background:linear-gradient(115deg,transparent 30%,rgba(169,127,38,.4) 50%,transparent 70%);
transform:translateX(-170%) skewX(-12deg);}
#akx-trans.on .sweep::before{animation:akxsweep .6s cubic-bezier(.4,0,.2,1);}
@keyframes akxsweep{to{transform:translateX(330%) skewX(-12deg);}}
@view-transition{navigation:auto;}
::view-transition-old(root){animation:akxvt-out .38s cubic-bezier(.4,0,.2,1) both;}
::view-transition-new(root){animation:akxvt-in .5s cubic-bezier(.2,.8,.2,1) both;}
@keyframes akxvt-out{to{opacity:0;transform:scale(1.012);filter:blur(6px) brightness(1.35);}}
@keyframes akxvt-in{from{opacity:0;transform:scale(.992);filter:blur(10px) brightness(1.3);}}
@media(prefers-reduced-motion:reduce){#akx-rays{animation:none;}
::view-transition-old(root),::view-transition-new(root){animation:none;}}
</style></head><body><canvas id="akx-gl"></canvas><div id="akx-rays"></div><div id="akx-spot"></div><div id="akx-progress"></div><div id="akx-trans"><div class="sweep"></div></div><div>
<h1>アカシック・レコード 25xx</h1>
<p>シロイ・サーガ『25xx アカシック・レコード』連載小説。</p>
<nav><a class="yt" href="https://www.youtube.com/@shiroi1229_studio">▶ 本編アニメ (YouTube)</a><a href="novel/index.html">連載小説</a><a href="podcast/feed.xml">音声劇フィード</a></nav>
</div><script>
(function(){"use strict";
var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
/* ---------- ページ演出(進捗/カーソル/傾き/遷移/磁力/出現) ---------- */
var pb=document.getElementById('akx-progress');
addEventListener('scroll',function(){var h=document.documentElement;
 var s=h.scrollTop/((h.scrollHeight-h.clientHeight)||1);if(pb)pb.style.width=(s*100)+'%';},{passive:true});
var spot=document.getElementById('akx-spot');
var fine=matchMedia('(pointer:fine)').matches,dot,ring,cx=0,cy=0,rx2=0,ry2=0;
if(fine&&!rm){document.body.classList.add('cursorfx');
 dot=document.createElement('div');dot.className='akx-dot';
 ring=document.createElement('div');ring.className='akx-ring';
 document.body.appendChild(dot);document.body.appendChild(ring);
 (function loop(){rx2+=(cx-rx2)*.16;ry2+=(cy-ry2)*.16;
  ring.style.transform='translate('+rx2+'px,'+ry2+'px) translate(-50%,-50%)';
  requestAnimationFrame(loop);})();}
document.addEventListener('mouseover',function(e){
 if(ring)ring.classList.toggle('hot',!!(e.target.closest&&e.target.closest('a,button')));});
document.querySelectorAll('.mag').forEach(function(el){
 el.addEventListener('mousemove',function(e){if(rm)return;var r=el.getBoundingClientRect();
  el.style.transform='translate('+((e.clientX-r.left-r.width/2)*.2)+'px,'+((e.clientY-r.top-r.height/2)*.24)+'px)';});
 el.addEventListener('mouseleave',function(){el.style.transform='';});});
if(!rm)document.querySelectorAll('.tilt').forEach(function(el){
 el.addEventListener('mousemove',function(e){var r=el.getBoundingClientRect();
  var a=(e.clientX-r.left)/r.width-.5,b=(e.clientY-r.top)/r.height-.5;
  el.style.transform='perspective(760px) rotateY('+(a*7)+'deg) rotateX('+(-b*7)+'deg) translateY(-3px)';});
 el.addEventListener('mouseleave',function(){el.style.transform='';});});
var io=new IntersectionObserver(function(es){es.forEach(function(e){
 if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
var tr=document.getElementById('akx-trans');
if(tr)document.addEventListener('click',function(e){
 var a=e.target.closest?e.target.closest('a'):null;if(!a||rm)return;
 if(a.target==='_blank'||a.hasAttribute('download'))return;
 var href=a.getAttribute('href')||'';
 if(!href||href[0]==='#'||href.indexOf('mailto:')===0)return;
 if(href.indexOf('http')===0&&a.host!==location.host)return;
 e.preventDefault();
 tr.style.setProperty('--tx',(e.clientX/innerWidth*100)+'%');
 tr.style.setProperty('--ty',(e.clientY/innerHeight*100)+'%');
 tr.classList.add('on');setTimeout(function(){location.href=a.href;},430);});
addEventListener('pageshow',function(ev){if(ev.persisted&&tr)tr.classList.remove('on');});

/* ---------- AKX Plexus Engine: 本物の3D(WebGL / 2Dフォールバック) ---------- */
var cv=document.getElementById('akx-gl');if(!cv)return;
var TAU=Math.PI*2,DPR=Math.min(devicePixelRatio||1,2),W=1,H=1,ASP=1;
var gl=null,ctx2=null;
try{gl=cv.getContext('webgl',{alpha:true,antialias:true,premultipliedAlpha:false});}catch(_e){}
if(!gl)ctx2=cv.getContext('2d');
/* --- シミュレーション(共有) --- */
var N=210,DUST=700,REACH=.5,R2=.55*.55;
function rnd(){return Math.random();}
var nd=[],du=[];
for(var i=0;i<N;i++)nd.push({
 bx:(rnd()*2-1)*1.28,by:(rnd()*2-1)*.96,bz:(rnd()*2-1)*.96,
 a1:.05+rnd()*.1,a2:.04+rnd()*.09,a3:.05+rnd()*.1,
 w1:TAU/(13+rnd()*17),w2:TAU/(15+rnd()*19),w3:TAU/(12+rnd()*16),
 p1:rnd()*TAU,p2:rnd()*TAU,p3:rnd()*TAU,ox:0,oy:0,oz:0,tw:rnd()*TAU});
for(i=0;i<DUST;i++)du.push({x:(rnd()*2-1)*1.7,y:(rnd()*2-1)*1.15,z:(rnd()*2-1),
 w:TAU/(18+rnd()*26),p:rnd()*TAU,a:.06+rnd()*.15,s:.6+rnd()*1.7});
var wx=new Float32Array(N),wy=new Float32Array(N),wz=new Float32Array(N);
var sx=new Float32Array(N),sy=new Float32Array(N),sz=new Float32Array(N),sp=new Float32Array(N);
var mx=0,my=0,tmx=0,tmy=0,hasMouse=false;
addEventListener('mousemove',function(e){
 tmx=e.clientX/W*2-1;tmy=-(e.clientY/H*2-1);hasMouse=true;
 if(spot){spot.style.setProperty('--mx',(e.clientX/W*100)+'%');
  spot.style.setProperty('--my',(e.clientY/H*100)+'%');}
 cx=e.clientX;cy=e.clientY;
 if(dot)dot.style.transform='translate('+cx+'px,'+cy+'px) translate(-50%,-50%)';},{passive:true});
var CAM=2.6,F=2.15;
function resize(){W=innerWidth;H=innerHeight;ASP=W/H;
 cv.width=W*DPR;cv.height=H*DPR;
 if(gl)gl.viewport(0,0,cv.width,cv.height);
 if(ctx2)ctx2.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
/* --- WebGLセットアップ --- */
var progP=null,progF=null,bufP=null,bufF=null,bufD=null;
function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(s);return s;}
function prog(vs,fs){var p=gl.createProgram();gl.attachShader(p,sh(gl.VERTEX_SHADER,vs));
 gl.attachShader(p,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);
 if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw gl.getProgramInfoLog(p);return p;}
if(gl){try{
 progP=prog(
  'attribute vec2 aP;attribute float aS;attribute float aA;varying float vA;'+
  'void main(){gl_Position=vec4(aP,0.,1.);gl_PointSize=aS;vA=aA;}',
  'precision mediump float;varying float vA;uniform vec3 uCore;uniform vec3 uHalo;'+
  'void main(){float d=length(gl_PointCoord-.5);if(d>.5)discard;'+
  'float core=smoothstep(.34,.05,d);float halo=smoothstep(.5,.12,d);'+
  'vec3 col=mix(uHalo,uCore,core);gl_FragColor=vec4(col,vA*halo);}');
 progF=prog(
  'attribute vec2 aP;attribute float aA;varying float vA;'+
  'void main(){gl_Position=vec4(aP,0.,1.);vA=aA;}',
  'precision mediump float;varying float vA;uniform vec3 uC;'+
  'void main(){gl_FragColor=vec4(uC,vA);}');
 bufP=gl.createBuffer();bufF=gl.createBuffer();bufD=gl.createBuffer();
 gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
}catch(err){gl=null;ctx2=cv.getContext('2d');resize();}}
/* --- フレーム --- */
var ptA=new Float32Array(N*4),duA=new Float32Array(DUST*4);
var linkCap=N*8,flatA=new Float32Array(linkCap*18+64*9);
var t0=performance.now();
function frame(){
 var t=(performance.now()-t0)/1000;
 mx+=(tmx-mx)*.05;my+=(tmy-my)*.05;
 var ry=t*.045+mx*.5, rxc=-.14*my-.06*Math.sin(t*TAU/47);
 var fz=.3*Math.sin(t*TAU/11);
 /* マウスの世界座標(逆回転で z=0 平面へ) */
 var mwx=0,mwy=0,mwz=0;
 if(hasMouse){var vx=mx*ASP*(CAM)/F,vy=my*(CAM)/F;
  var c2=Math.cos(-rxc),s2=Math.sin(-rxc);
  var vy2=vy*c2, vz2=vy*s2;
  var c1=Math.cos(-ry),s1=Math.sin(-ry);
  mwx=vx*c1;mwz=-vx*s1+vz2;mwy=vy2;}
 var i,j;
 for(i=0;i<N;i++){var n=nd[i];
  var bx=n.bx+n.a1*Math.sin(t*n.w1+n.p1),
      by=n.by+n.a2*Math.sin(t*n.w2+n.p2),
      bz=n.bz+n.a3*Math.sin(t*n.w3+n.p3);
  var tx2=0,ty2=0,tz2=0;
  if(hasMouse&&!rm){var dx=mwx-bx,dy=mwy-by,dz=mwz-bz;
   var L=R2/(dx*dx+dy*dy+dz*dz+R2);      /* Lorentzian引力 */
   tx2=dx*L*.5;ty2=dy*L*.5;tz2=dz*L*.5;}
  n.ox+=(tx2-n.ox)*.03;n.oy+=(ty2-n.oy)*.03;n.oz+=(tz2-n.oz)*.03; /* ゆっくり数学的に */
  wx[i]=bx+n.ox;wy[i]=by+n.oy;wz[i]=bz+n.oz;
  var c=Math.cos(ry),s=Math.sin(ry);
  var x1=wx[i]*c+wz[i]*s, z1=-wx[i]*s+wz[i]*c;
  var cc=Math.cos(rxc),ss=Math.sin(rxc);
  var y1=wy[i]*cc-z1*ss, z2b=wy[i]*ss+z1*cc;
  var pe=F/(CAM-z2b);
  sx[i]=x1*pe/ASP;sy[i]=y1*pe;sz[i]=z2b;sp[i]=pe;}
 /* 近接(世界距離)→リンク */
 var adj=[],links=[];for(i=0;i<N;i++)adj.push([]);
 for(i=0;i<N;i++)for(j=i+1;j<N;j++){
  var ddx=wx[i]-wx[j],ddy=wy[i]-wy[j],ddz=wz[i]-wz[j];
  var d=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
  if(d<REACH){links.push(i,j,1-d/REACH);adj[i].push(j);adj[j].push(i);}}
 /* ノード点スプライト */
 for(i=0;i<N;i++){var blur=Math.min(1,Math.abs(sz[i]-fz)*1.55);
  var size=(2.4+3.4*sp[i])*(1+2.6*blur)*DPR;
  var al=(.5+.3*Math.sin(t*.6+nd[i].tw))*(1-.68*blur);
  ptA[i*4]=sx[i];ptA[i*4+1]=sy[i];ptA[i*4+2]=size;ptA[i*4+3]=Math.max(al,.06);}
 /* 塵 */
 for(i=0;i<DUST;i++){var q=du[i];
  var qx=q.x+.06*Math.sin(t*q.w+q.p)+mx*.06*q.z,qy=q.y+.05*Math.cos(t*q.w*1.3+q.p)+my*.05*q.z;
  var pe2=F/(CAM-q.z*.9);
  duA[i*4]=qx*pe2/ASP;duA[i*4+1]=qy*pe2;duA[i*4+2]=(q.s+1.1*pe2)*DPR;
  duA[i*4+3]=q.a*(.6+.4*Math.sin(t*q.w*2+q.p));}
 /* リンク=幅付きクアッド、三角膜 */
 var fi=0;
 function quad(ax,ay,bx2,by2,w,al){
  var dx2=bx2-ax,dy2=by2-ay,len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
  var nx=-dy2/len*w,ny=dx2/len*w*ASP;nx/=ASP;
  flatA[fi++]=ax+nx;flatA[fi++]=ay+ny;flatA[fi++]=al;
  flatA[fi++]=ax-nx;flatA[fi++]=ay-ny;flatA[fi++]=al;
  flatA[fi++]=bx2+nx;flatA[fi++]=by2+ny;flatA[fi++]=al;
  flatA[fi++]=ax-nx;flatA[fi++]=ay-ny;flatA[fi++]=al;
  flatA[fi++]=bx2+nx;flatA[fi++]=by2+ny;flatA[fi++]=al;
  flatA[fi++]=bx2-nx;flatA[fi++]=by2-ny;flatA[fi++]=al;}
 for(var l=0;l<links.length;l+=3){var a=links[l],b=links[l+1],o=links[l+2];
  if(fi>linkCap*18-20)break;
  var ab=(Math.min(1,Math.abs(sz[a]-fz)*1.55)+Math.min(1,Math.abs(sz[b]-fz)*1.55))/2;
  quad(sx[a],sy[a],sx[b],sy[b],(0.0011+0.0018*(sp[a]+sp[b])*.5)*(1+1.3*ab),o*.5*(1-.55*ab));}
 var linkEnd=fi;
 var tct=0;
 for(i=0;i<N&&tct<44;i++)for(var xi=0;xi<adj[i].length&&tct<44;xi++){
  var jj=adj[i][xi];if(jj<=i)continue;
  for(var yi=0;yi<adj[jj].length;yi++){var k=adj[jj][yi];
   if(k<=jj||adj[i].indexOf(k)<0)continue;
   flatA[fi++]=sx[i];flatA[fi++]=sy[i];flatA[fi++]=.07;
   flatA[fi++]=sx[jj];flatA[fi++]=sy[jj];flatA[fi++]=.07;
   flatA[fi++]=sx[k];flatA[fi++]=sy[k];flatA[fi++]=.07;
   tct++;if(tct>=44)break;}}
 /* ---- 描画 ---- */
 if(gl){
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(progF);
  var aP=gl.getAttribLocation(progF,'aP'),aA=gl.getAttribLocation(progF,'aA');
  gl.bindBuffer(gl.ARRAY_BUFFER,bufF);
  gl.bufferData(gl.ARRAY_BUFFER,flatA.subarray(0,fi),gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,12,0);
  gl.enableVertexAttribArray(aA);gl.vertexAttribPointer(aA,1,gl.FLOAT,false,12,8);
  var uC=gl.getUniformLocation(progF,'uC');
  gl.uniform3f(uC,.75,.6,.24);                    /* 三角膜=金 */
  gl.drawArrays(gl.TRIANGLES,linkEnd/3,(fi-linkEnd)/3);
  gl.uniform3f(uC,.16,.23,.42);                    /* 結線=藍墨 */
  gl.drawArrays(gl.TRIANGLES,0,linkEnd/3);
  gl.useProgram(progP);
  var pP=gl.getAttribLocation(progP,'aP'),pS=gl.getAttribLocation(progP,'aS'),pA=gl.getAttribLocation(progP,'aA');
  var uCo=gl.getUniformLocation(progP,'uCore'),uHa=gl.getUniformLocation(progP,'uHalo');
  gl.bindBuffer(gl.ARRAY_BUFFER,bufD);
  gl.bufferData(gl.ARRAY_BUFFER,duA,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(pP);gl.vertexAttribPointer(pP,2,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(pS);gl.vertexAttribPointer(pS,1,gl.FLOAT,false,16,8);
  gl.enableVertexAttribArray(pA);gl.vertexAttribPointer(pA,1,gl.FLOAT,false,16,12);
  gl.uniform3f(uCo,.35,.42,.62);gl.uniform3f(uHa,.55,.62,.8);
  gl.drawArrays(gl.POINTS,0,DUST);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufP);
  gl.bufferData(gl.ARRAY_BUFFER,ptA,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(pP);gl.vertexAttribPointer(pP,2,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(pS);gl.vertexAttribPointer(pS,1,gl.FLOAT,false,16,8);
  gl.enableVertexAttribArray(pA);gl.vertexAttribPointer(pA,1,gl.FLOAT,false,16,12);
  gl.uniform3f(uCo,.7,.53,.13);gl.uniform3f(uHa,.85,.72,.38);   /* 金箔 */
  gl.drawArrays(gl.POINTS,0,N);
 }else if(ctx2){
  ctx2.clearRect(0,0,W,H);
  function px(v){return (v+1)*.5*W;}function py(v){return (1-(v+1)*.5)*H;}
  for(var l2=0;l2<links.length;l2+=3){var a2=links[l2],b2=links[l2+1],o2=links[l2+2];
   ctx2.strokeStyle='rgba(41,59,107,'+(o2*.45)+')';
   ctx2.lineWidth=1+sp[a2];ctx2.beginPath();
   ctx2.moveTo(px(sx[a2]),py(sy[a2]));ctx2.lineTo(px(sx[b2]),py(sy[b2]));ctx2.stroke();}
  for(i=0;i<N;i++){ctx2.beginPath();
   ctx2.arc(px(sx[i]),py(sy[i]),ptA[i*4+2]/DPR*.5,0,TAU);
   ctx2.fillStyle='rgba(169,127,38,'+ptA[i*4+3]+')';ctx2.fill();}}
 if(!rm)requestAnimationFrame(frame);}
frame();if(rm){/* 静止1フレームのみ */}
})();
</script></body></html>
