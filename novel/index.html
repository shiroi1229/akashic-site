  'void main(){gl_FragColor=vec4(uC,vA);}');
 bufP=gl.createBuffer();bufF=gl.createBuffer();bufD=gl.createBuffer();
 gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
}catch(err){gl=null;ctx2=cv.getContext('2d');resize();}}
/* --- フレーム --- */
var ptA=new Float32Array(N*4),duA=new Float32Array(DUST*4);
var linkCap=N*8,flatA=new Float32Array(linkCap*18+64*9);
var t0=performance.now();
function frame(){
 var t=(performance.now()-t0)/1000;
 mx+=(tmx-mx)*.05;my+=(tmy-my)*.05;
 var ry=t*.045+mx*.5, rxc=-.14*my-.06*Math.sin(t*TAU/47);
 var fz=.3*Math.sin(t*TAU/11);
 /* マウスの世界座標(逆回転で z=0 平面へ) */
 var mwx=0,mwy=0,mwz=0;
 if(hasMouse){var vx=mx*ASP*(CAM)/F,vy=my*(CAM)/F;
  var c2=Math.cos(-rxc),s2=Math.sin(-rxc);
  var vy2=vy*c2, vz2=vy*s2;
  var c1=Math.cos(-ry),s1=Math.sin(-ry);
  mwx=vx*c1;mwz=-vx*s1+vz2;mwy=vy2;}
 var i,j;
 for(i=0;i<N;i++){var n=nd[i];
  var bx=n.bx+n.a1*Math.sin(t*n.w1+n.p1),
      by=n.by+n.a2*Math.sin(t*n.w2+n.p2),
      bz=n.bz+n.a3*Math.sin(t*n.w3+n.p3);
  var tx2=0,ty2=0,tz2=0;
  if(hasMouse&&!rm){var dx=mwx-bx,dy=mwy-by,dz=mwz-bz;
   var L=R2/(dx*dx+dy*dy+dz*dz+R2);      /* Lorentzian引力 */
   tx2=dx*L*.5;ty2=dy*L*.5;tz2=dz*L*.5;}
  n.ox+=(tx2-n.ox)*.03;n.oy+=(ty2-n.oy)*.03;n.oz+=(tz2-n.oz)*.03; /* ゆっくり数学的に */
  wx[i]=bx+n.ox;wy[i]=by+n.oy;wz[i]=bz+n.oz;
  var c=Math.cos(ry),s=Math.sin(ry);
  var x1=wx[i]*c+wz[i]*s, z1=-wx[i]*s+wz[i]*c;
  var cc=Math.cos(rxc),ss=Math.sin(rxc);
  var y1=wy[i]*cc-z1*ss, z2b=wy[i]*ss+z1*cc;
  var pe=F/(CAM-z2b);
  sx[i]=x1*pe/ASP;sy[i]=y1*pe;sz[i]=z2b;sp[i]=pe;}
 /* 近接(世界距離)→リンク */
 var adj=[],links=[];for(i=0;i<N;i++)adj.push([]);
 for(i=0;i<N;i++)for(j=i+1;j<N;j++){
  var ddx=wx[i]-wx[j],ddy=wy[i]-wy[j],ddz=wz[i]-wz[j];
  var d=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
  if(d<REACH){links.push(i,j,1-d/REACH);adj[i].push(j);adj[j].push(i);}}
 /* ノード点スプライト */
 for(i=0;i<N;i++){var blur=Math.min(1,Math.abs(sz[i]-fz)*1.55);
  var size=(2.4+3.4*sp[i])*(1+2.6*blur)*DPR;
  var al=(.5+.3*Math.sin(t*.6+nd[i].tw))*(1-.68*blur);
  ptA[i*4]=sx[i];ptA[i*4+1]=sy[i];ptA[i*4+2]=size;ptA[i*4+3]=Math.max(al,.06);}
 /* 塵 */
 for(i=0;i<DUST;i++){var q=du[i];
  var qx=q.x+.06*Math.sin(t*q.w+q.p)+mx*.06*q.z,qy=q.y+.05*Math.cos(t*q.w*1.3+q.p)+my*.05*q.z;
  var pe2=F/(CAM-q.z*.9);
  duA[i*4]=qx*pe2/ASP;duA[i*4+1]=qy*pe2;duA[i*4+2]=(q.s+1.1*pe2)*DPR;
  duA[i*4+3]=q.a*(.6+.4*Math.sin(t*q.w*2+q.p));}
 /* リンク=幅付きクアッド、三角膜 */
 var fi=0;
 function quad(ax,ay,bx2,by2,w,al){
  var dx2=bx2-ax,dy2=by2-ay,len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
  var nx=-dy2/len*w,ny=dx2/len*w*ASP;nx/=ASP;
  flatA[fi++]=ax+nx;flatA[fi++]=ay+ny;flatA[fi++]=al;
  flatA[fi++]=ax-nx;flatA[fi++]=ay-ny;flatA[fi++]=al;
  flatA[fi++]=bx2+nx;flatA[fi++]=by2+ny;flatA[fi++]=al;
  flatA[fi++]=ax-nx;flatA[fi++]=ay-ny;flatA[fi++]=al;
  flatA[fi++]=bx2+nx;flatA[fi++]=by2+ny;flatA[fi++]=al;
  flatA[fi++]=bx2-nx;flatA[fi++]=by2-ny;flatA[fi++]=al;}
 for(var l=0;l<links.length;l+=3){var a=links[l],b=links[l+1],o=links[l+2];
  if(fi>linkCap*18-20)break;
  var ab=(Math.min(1,Math.abs(sz[a]-fz)*1.55)+Math.min(1,Math.abs(sz[b]-fz)*1.55))/2;
  quad(sx[a],sy[a],sx[b],sy[b],(0.0011+0.0018*(sp[a]+sp[b])*.5)*(1+1.3*ab),o*.5*(1-.55*ab));}
 var linkEnd=fi;
 var tct=0;
 for(i=0;i<N&&tct<44;i++)for(var xi=0;xi<adj[i].length&&tct<44;xi++){
  var jj=adj[i][xi];if(jj<=i)continue;
  for(var yi=0;yi<adj[jj].length;yi++){var k=adj[jj][yi];
   if(k<=jj||adj[i].indexOf(k)<0)continue;
   flatA[fi++]=sx[i];flatA[fi++]=sy[i];flatA[fi++]=.07;
   flatA[fi++]=sx[jj];flatA[fi++]=sy[jj];flatA[fi++]=.07;
   flatA[fi++]=sx[k];flatA[fi++]=sy[k];flatA[fi++]=.07;
   tct++;if(tct>=44)break;}}
 /* ---- 描画 ---- */
 if(gl){
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(progF);
  var aP=gl.getAttribLocation(progF,'aP'),aA=gl.getAttribLocation(progF,'aA');
  gl.bindBuffer(gl.ARRAY_BUFFER,bufF);
  gl.bufferData(gl.ARRAY_BUFFER,flatA.subarray(0,fi),gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,12,0);
  gl.enableVertexAttribArray(aA);gl.vertexAttribPointer(aA,1,gl.FLOAT,false,12,8);
  var uC=gl.getUniformLocation(progF,'uC');
  gl.uniform3f(uC,.75,.6,.24);                    /* 三角膜=金 */
  gl.drawArrays(gl.TRIANGLES,linkEnd/3,(fi-linkEnd)/3);
  gl.uniform3f(uC,.16,.23,.42);                    /* 結線=藍墨 */
  gl.drawArrays(gl.TRIANGLES,0,linkEnd/3);
  gl.useProgram(progP);
  var pP=gl.getAttribLocation(progP,'aP'),pS=gl.getAttribLocation(progP,'aS'),pA=gl.getAttribLocation(progP,'aA');
  var uCo=gl.getUniformLocation(progP,'uCore'),uHa=gl.getUniformLocation(progP,'uHalo');
  gl.bindBuffer(gl.ARRAY_BUFFER,bufD);
  gl.bufferData(gl.ARRAY_BUFFER,duA,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(pP);gl.vertexAttribPointer(pP,2,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(pS);gl.vertexAttribPointer(pS,1,gl.FLOAT,false,16,8);
  gl.enableVertexAttribArray(pA);gl.vertexAttribPointer(pA,1,gl.FLOAT,false,16,12);
  gl.uniform3f(uCo,.35,.42,.62);gl.uniform3f(uHa,.55,.62,.8);
  gl.drawArrays(gl.POINTS,0,DUST);
  gl.bindBuffer(gl.ARRAY_BUFFER,bufP);
  gl.bufferData(gl.ARRAY_BUFFER,ptA,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(pP);gl.vertexAttribPointer(pP,2,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(pS);gl.vertexAttribPointer(pS,1,gl.FLOAT,false,16,8);
  gl.enableVertexAttribArray(pA);gl.vertexAttribPointer(pA,1,gl.FLOAT,false,16,12);
  gl.uniform3f(uCo,.7,.53,.13);gl.uniform3f(uHa,.85,.72,.38);   /* 金箔 */
  gl.drawArrays(gl.POINTS,0,N);
 }else if(ctx2){
  ctx2.clearRect(0,0,W,H);
  function px(v){return (v+1)*.5*W;}function py(v){return (1-(v+1)*.5)*H;}
  for(var l2=0;l2<links.length;l2+=3){var a2=links[l2],b2=links[l2+1],o2=links[l2+2];
   ctx2.strokeStyle='rgba(41,59,107,'+(o2*.45)+')';
   ctx2.lineWidth=1+sp[a2];ctx2.beginPath();
   ctx2.moveTo(px(sx[a2]),py(sy[a2]));ctx2.lineTo(px(sx[b2]),py(sy[b2]));ctx2.stroke();}
  for(i=0;i<N;i++){ctx2.beginPath();
   ctx2.arc(px(sx[i]),py(sy[i]),ptA[i*4+2]/DPR*.5,0,TAU);
   ctx2.fillStyle='rgba(169,127,38,'+ptA[i*4+3]+')';ctx2.fill();}}
 if(!rm)requestAnimationFrame(frame);}
frame();if(rm){/* 静止1フレームのみ */}
})();
</script></body></html>
